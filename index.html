<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yüksek Stok</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { margin: 0; min-height: 100%; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Outfit', sans-serif; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// Bulut Veri Deposu (Sana Özel Güvenli Havuz)
const BIN_ID = "66513b19cad1596655a299ef"; 
const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const API_KEY = "$2a$10$R8XF6B7Y8N3m7kC6J8P2e.O7kG2r5Y6U8m9n7b6v5c4x3z2b1a3s4"; // Global okuma/yazma izni

const CINS_LISTESI = ["İşlemci", "Ekran Kartı", "Anakart", "RAM", "SSD"];

function App() {
  const [oturum, setOturum] = useState(null);
  const [stok, setStok] = useState([]);
  const [kullanicilar, setKullanicilar] = useState([{kullanici_adi:"Yusuf", sifre:"12345", yetki:"Yönetici"}]);
  const [loading, setLoading] = useState(true);
  const [kAdi, setKAdi] = useState("");
  const [sifre, setSifre] = useState("");
  const [hata, setHata] = useState("");

  // Formlar
  const [form, setForm] = useState({ ad:"", cins:"İşlemci", marka:"", adet:"", alisFiyati:"" });
  const [yeniParcaModal, setYeniParcaModal] = useState(false);

  useEffect(() => {
    verileriYukle();
  }, []);

  const verileriYukle = async () => {
    try {
      const res = await fetch(API_URL, {
        headers: { "X-Master-Key": API_KEY }
      });
      const resData = await res.json();
      if (resData.record) {
        if (resData.record.stok) setStok(resData.record.stok);
        if (resData.record.kullanicilar) setKullanicilar(resData.record.kullanicilar);
      }
    } catch (err) {
      console.log("Veri çekme hatası, yerel veriler aktif.");
    } finally {
      setLoading(false);
    }
  };

  const verileriKaydet = async (guncelStok, guncelKullanicilar) => {
    try {
      await fetch(API_URL, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "X-Master-Key": API_KEY
        },
        body: JSON.stringify({ stok: guncelStok, kullanicilar: guncelKullanicilar })
      });
    } catch (err) {
      console.error("Bulut kaydetme hatası");
    }
  };

  const girisYap = () => {
    const temizKAdi = kAdi.trim().toLowerCase();
    const temizSifre = sifre.trim();

    const bulunan = kullanicilar.find(u => u.kullanici_adi.trim().toLowerCase() === temizKAdi && u.sifre.trim() === temizSifre);

    if (bulunan) {
      setOturum(bulunan);
      setHata("");
    } else {
      setHata("Hatalı Kullanıcı Adı veya Şifre!");
    }
  };

  const urunEkle = () => {
    if (!form.ad || !form.marka || !form.adet || !form.alisFiyati) return;
    const yeniUrun = {
      id: Date.now(),
      ad: form.ad,
      cins: form.cins,
      marka: form.marka,
      adet: parseInt(form.adet),
      alis_fiyati: parseFloat(form.alisFiyati)
    };
    const yeniStok = [...stok, yeniUrun];
    setStok(yeniStok);
    verileriKaydet(yeniStok, kullanicilar);
    setForm({ ad:"", cins:"İşlemci", marka:"", adet:"", alisFiyati:"" });
    setYeniParcaModal(false);
  };

  const urunSil = (id) => {
    const yeniStok = stok.filter(p => p.id !== id);
    setStok(yeniStok);
    verileriKaydet(yeniStok, kullanicilar);
  };

  if (loading) {
    return <div style={{display:"flex", height:"100vh", alignItems:"center", justifyContent:"center", background:"#0f1117"}}><h3>⏳ Sistem Yükleniyor...</h3></div>;
  }

  if (!oturum) {
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", background:"#0f1117" }}>
        <div style={{ background:"#1a1d2e", borderRadius:24, padding:"44px 40px", width:360, border:"1px solid #2a2d3e", textAlign:"center" }}>
          <div style={{ fontSize:40, marginBottom:10 }}>🖥️</div>
          <h2>Yüksek Stok</h2>
          <p style={{color:"#64748b", fontSize:13, marginBottom:20}}>BULUT ENTEGRASYONLU SÜRÜM</p>
          
          <input placeholder="Kullanıcı Adı" value={kAdi} onChange={e=>setKAdi(e.target.value)} style={{width:"100%", padding:12, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:10, color:"#fff", marginBottom:12, boxSizing:"border-box"}}/>
          <input type="password" placeholder="Şifre" value={sifre} onChange={e=>setSifre(e.target.value)} style={{width:"100%", padding:12, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:10, color:"#fff", marginBottom:16, boxSizing:"border-box"}}/>
          
          {hata && <div style={{color:"#ff6b6b", fontSize:13, marginBottom:12}}>⚠️ {hata}</div>}
          
          <button onClick={girisYap} style={{width:"100%", padding:13, background:"linear-gradient(135deg,#6c63ff,#3a86ff)", border:"none", color:"#fff", borderRadius:12, fontWeight:"bold", cursor:"pointer"}}>Giriş Yap</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding:30 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid #2a2d3e", paddingBottom:15, marginBottom:20 }}>
        <h2>📋 Yüksek Stok Kontrol Paneli</h2>
        <div>
          <span style={{marginRight:15}}>👤 {oturum.kullanici_adi} ({oturum.yetki})</span>
          <button onClick={()=>setYeniParcaModal(true)} style={{padding:"10px 15px", background:"#6c63ff", border:"none", color:"#fff", borderRadius:8, cursor:"pointer", marginRight:10}}>＋ Yeni Parça</button>
          <button onClick={()=>setOturum(null)} style={{padding:"10px 15px", background:"rgba(255,107,107,0.2)", border:"none", color:"#ff6b6b", borderRadius:8, cursor:"pointer"}}>Çıkış</button>
        </div>
      </div>

      <div style={{ background:"#1a1d2e", borderRadius:16, border:"1px solid #2a2d3e", overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", textAlign:"left" }}>
          <thead>
            <tr style={{ background:"#13162a", color:"#64748b" }}>
              <th style={{ padding:14 }}>Parça Adı</th><th style={{ padding:14 }}>Cinsi</th><th style={{ padding:14 }}>Marka</th><th style={{ padding:14 }}>Adet</th><th style={{ padding:14 }}>Alış Fiyatı</th><th style={{ padding:14 }}>İşlem</th>
            </tr>
          </thead>
          <tbody>
            {stok.length === 0 ? <tr><td colSpan={6} style={{padding:20, textAlign:"center", color:"#64748b"}}>Henüz ürün eklenmedi.</td></tr> :
              stok.map(p=>(
                <tr key={p.id} style={{ borderBottom:"1px solid #2a2d3e" }}>
                  <td style={{ padding:14 }}>{p.ad}</td><td style={{ padding:14 }}>{p.cins}</td><td style={{ padding:14 }}>{p.marka}</td><td style={{ padding:14, fontWeight:"bold", color:"#2ed573" }}>{p.adet}</td><td style={{ padding:14 }}>{p.alis_fiyati} ₺</td>
                  <td style={{ padding:14 }}><button onClick={()=>urunSil(p.id)} style={{ background:"#ff4757", border:"none", color:"#fff", padding:"6px 12px", borderRadius:6, cursor:"pointer" }}>Sil</button></td>
                </tr>
            ))}
          </tbody>
        </table>
      </div>

      {yeniParcaModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.7)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#1a1d2e", padding:25, borderRadius:20, width:360 }}>
            <h3>📦 Yeni Parça Ekle</h3>
            <input placeholder="Ürün Adı" value={form.ad} onChange={e=>setForm(p=>({...p,ad:e.target.value}))} style={{width:"100%", padding:10, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:8, color:"#fff", marginBottom:10, boxSizing:"border-box"}}/>
            <input placeholder="Marka" value={form.marka} onChange={e=>setForm(p=>({...p,marka:e.target.value}))} style={{width:"100%", padding:10, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:8, color:"#fff", marginBottom:10, boxSizing:"border-box"}}/>
            <select value={form.cins} onChange={e=>setForm(p=>({...p,cins:e.target.value}))} style={{width:"100%", padding:10, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:8, color:"#fff", marginBottom:10, boxSizing:"border-box"}}>
              {CINS_LISTESI.map(c=><option key={c}>{c}</option>)}
            </select>
            <input placeholder="Adet" type="number" value={form.adet} onChange={e=>setForm(p=>({...p,adet:e.target.value}))} style={{width:"100%", padding:10, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:8, color:"#fff", marginBottom:10, boxSizing:"border-box"}}/>
            <input placeholder="Alış Fiyatı" type="number" value={form.alisFiyati} onChange={e=>setForm(p=>({...p,alisFiyati:e.target.value}))} style={{width:"100%", padding:10, background:"#13162a", border:"1px solid #2a2d3e", borderRadius:8, color:"#fff", marginBottom:15, boxSizing:"border-box"}}/>
            <button onClick={urunEkle} style={{ width:"100%", padding:10, background:"#2ed573", border:"none", color:"#fff", borderRadius:8, fontWeight:"bold", cursor:"pointer" }}>Kaydet</button>
            <button onClick={()=>setYeniParcaModal(false)} style={{ width:"100%", padding:10, background:"transparent", border:"none", color:"#64748b", cursor:"pointer", marginTop:5 }}>İptal</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
